name: Deploy Production

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vocabume
          POSTGRES_USER: vocabume
          POSTGRES_PASSWORD: vocabume
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vocabume -d vocabume"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DEBUG: "true"
      SECRET_KEY: ci-only-secret-key-with-more-than-fifty-safe-characters-000000
      DB_NAME: vocabume
      DB_USER: vocabume
      DB_PASSWORD: vocabume
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      TELEGRAM_TOKEN: "123456:ci-test-token"
      TELEGRAM_BOT_USERNAME: VocabuMe_test_bot
      WEBAPP_URL: https://example.test
      OPENAI_API_KEY: ci-test-key
      ALERT_CHAT_ID: "0"
      USE_POSTGRES_TESTS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Verify dependency lock
        run: python scripts/check_dependency_lock.py && python -m pip check

      - name: Backend static checks
        run: |
          make format-check
          make lint-backend
          make typecheck

      - name: Django deployment and migration checks
        run: |
          DEBUG=false python manage.py check --deploy
          DJANGO_SETTINGS_MODULE=core.test_settings python manage.py makemigrations --check --dry-run

      - name: PostgreSQL backend tests and coverage
        run: python -m pytest --create-db --cov=vocab --cov=core --cov-fail-under=40 -q

      - name: Dependency security audit
        run: python -m pip_audit -r requirements-prod.lock

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend lint and build
        working-directory: frontend
        run: |
          npm run lint -- --max-warnings 0
          npm run build

  deploy:
    needs: quality
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_KEY: ${{ secrets.SSH_KEY }}
      REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
      RUNTIME_USER: eduard
      SYSTEMD_SERVICE: englishbot.service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Deploy
        run: bash scripts/deploy_prod.sh
